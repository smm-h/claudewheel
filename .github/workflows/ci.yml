name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-python@v5
      with:
        python-version: "3.14"
    - run: python3 -m pytest tests/ -v
    - uses: actions/setup-node@v6
      with:
        node-version: 22
    - run: node -e "require('./package.json')"
    - run: node bin/claudewheel.js --help || true
