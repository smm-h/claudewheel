# Version bump type: patch, minor, or major
bump = "minor"
# Short description of this release (required)
description = "Add import command for importing session data from external Claude Code directories"
# Optional context explaining why these changes were made
context = "The new `claudewheel import` command enables importing Claude Code session data from external directories (e.g., Windows backups onto a Linux machine). It handles cross-OS path rewriting (Windows backslashes to Unix forward slashes), collision detection for sessions that already exist in the store, optional session re-identification (reid), and a dry-run mode for previewing what would be imported."
