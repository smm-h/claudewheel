# Version bump type: patch, minor, major, hotfix, or prerelease
bump = "patch"
# Short description of this release (required)
description = "Fixes crashes on malformed install manifests; hardens the toolchain behind the scenes."
# Optional context explaining why these changes were made
context = """
The user-facing fix closes every escape point where a malformed server
manifest (missing checksum, wrong-shaped platforms or entries, null values)
could crash the installer instead of reporting a clean error. Internally,
this release completes a large hardening effort: the entire test suite was
converted to autospec'd mocks (0 bare patch sites, enforced by a new
AST-based preflight gate), mypy strict now covers tests as well as the
package, ruff lint and formatting were adopted repo-wide, and all release
gates are defined as canonical wrapper scripts so gate scope can never
silently drift.
"""
# Pre-release identifier: alpha, beta, rc, or stable
# preid = ""
# Set to true to generate a blog post for this release
# blog = false
include = ["npm", "pypi"]
exclude = []
