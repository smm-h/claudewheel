# Version bump type: patch, minor, major, hotfix, or prerelease
bump = "patch"
# Short description of this release (required)
description = "mv now migrates nested project sessions and rewrites githubRepoPaths"
# Optional context explaining why these changes were made
context = """
mv previously matched only the exact moved path: session data for projects nested
inside a moved directory was silently left stale (requiring manual per-child
--post-hoc runs), and githubRepoPaths values were never rewritten for any move.
mv is now prefix-aware over real decoded paths, verifies every descendant's
destination before touching anything, and hard-errors on ambiguous encoded names.
"""
# Pre-release identifier: alpha, beta, rc, or stable
# preid = ""
# Set to true to generate a blog post for this release
# blog = false
include = ["npm", "pypi"]
exclude = []
