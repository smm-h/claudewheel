# Version bump type: patch, minor, major, hotfix, or prerelease
bump = "patch"
# Short description of this release (required)
description = "Fixes from the post-refactor hardening pass: clone-from-default profile creation, honest health reporting, self-cleaning failed profile creation, and an exact hooks-wired check."
# Optional context explaining why these changes were made
context = """
A test-sandbox escape during the 0.22.0 Workspace refactor exposed several latent
weaknesses found while remediating: the hooks-wired health check accepted hook
commands by name substring (passing even when hooks pointed at a nonexistent
directory), the inode check claimed cleanups it could not persist on read-only
workspaces, a failed profile creation left debris that blocked retries, and the
wizard's clone-from-default option produced an empty-base profile. All four are
fixed with regression tests, alongside a permanent test-suite guard asserting the
real workspace's config surface is immutable under every write path.
"""
